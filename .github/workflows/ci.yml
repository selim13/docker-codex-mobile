name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Validate npm lockfile
        run: npm ci --omit=dev --dry-run

      - name: Validate Compose config
        run: docker compose config

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: false
          tags: docker-codex-mobile:ci
          build-args: |
            IMAGE_CREATED=${{ github.event.repository.updated_at }}
            IMAGE_REVISION=${{ github.sha }}
            IMAGE_VERSION=ci
